name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run --profile ci

      - name: Publish test results
        if: always()
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, sys

          path = "target/nextest/ci/junit.xml"
          if not os.path.exists(path):
              print("No test results found.", file=sys.stderr)
              sys.exit(0)

          tree = ET.parse(path)
          root = tree.getroot()
          suite = root.find("testsuite") or root

          total   = int(suite.get("tests",    0))
          failed  = int(suite.get("failures", 0)) + int(suite.get("errors", 0))
          skipped = int(suite.get("skipped",  0))
          passed  = total - failed - skipped
          time    = suite.get("time", "?")

          lines = []
          lines.append(f"## Test Results")
          lines.append(f"")
          icon = "✅" if failed == 0 else "❌"
          lines.append(f"{icon} **{passed} passed** · {failed} failed · {skipped} skipped · {total} total · {time}s")
          lines.append("")
          lines.append("| Status | Test |")
          lines.append("|--------|------|")

          for tc in suite.findall("testcase"):
              name = tc.get("name", "?")
              if tc.find("failure") is not None or tc.find("error") is not None:
                  lines.append(f"| ❌ | `{name}` |")
              elif tc.find("skipped") is not None:
                  lines.append(f"| ⏭️ | `{name}` |")
              else:
                  lines.append(f"| ✅ | `{name}` |")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("\n".join(lines) + "\n")
          EOF

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Format check
        run: cargo fmt --check
